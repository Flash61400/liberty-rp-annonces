<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fff; user-select: none; overflow: hidden; }
  canvas { display: block; border-radius: 10px; }
  .tap-hint { font-size: 13px; color: #aaa; margin-top: 10px; }
</style>
</head>
<body>
<canvas id="canvas" width="280" height="420"></canvas>
<div class="tap-hint">Tape pour voler !</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 280, H = 420;

let bird, pipes, score, frame, gameState, animId;

function init() {
  bird = { x: 60, y: H/2, vy: 0, r: 14 };
  pipes = [];
  score = 0;
  frame = 0;
  gameState = 'waiting'; // waiting, playing, dead
}

function jump() {
  if (gameState === 'waiting') { gameState = 'playing'; bird.vy = -7; }
  else if (gameState === 'playing') { bird.vy = -7; }
  else if (gameState === 'dead') { init(); }
}

function update() {
  if (gameState !== 'playing') return;
  // Bird physics
  bird.vy += 0.35;
  bird.y += bird.vy;
  // Pipes
  if (frame % 90 === 0) {
    const gap = 110;
    const top = 60 + Math.random() * (H - gap - 120);
    pipes.push({ x: W, top, bottom: top + gap });
  }
  pipes.forEach(p => p.x -= 2.5);
  pipes = pipes.filter(p => p.x > -60);
  // Score
  pipes.forEach(p => { if (Math.round(p.x) === 58) score++; });
  // Collision
  if (bird.y - bird.r < 0 || bird.y + bird.r > H) { gameState = 'dead'; return; }
  pipes.forEach(p => {
    if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + 52) {
      if (bird.y - bird.r < p.top || bird.y + bird.r > p.bottom) gameState = 'dead';
    }
  });
  frame++;
}

function draw() {
  // Sky
  ctx.fillStyle = '#1a2a4a';
  ctx.fillRect(0, 0, W, H);
  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  [[20,30],[80,60],[150,20],[220,45],[260,80],[40,100],[180,90]].forEach(([x,y]) => {
    ctx.fillRect(x, y, 2, 2);
  });
  // Pipes
  pipes.forEach(p => {
    ctx.fillStyle = '#2ecc40';
    ctx.fillRect(p.x, 0, 52, p.top);
    ctx.fillRect(p.x, p.bottom, 52, H - p.bottom);
    ctx.fillStyle = '#27ae36';
    ctx.fillRect(p.x - 4, p.top - 20, 60, 20);
    ctx.fillRect(p.x - 4, p.bottom, 60, 20);
  });
  // Ground
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(0, H - 20, W, 20);
  ctx.fillStyle = '#5a8a00';
  ctx.fillRect(0, H - 25, W, 8);
  // Bird
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(Math.min(Math.max(bird.vy * 0.05, -0.5), 0.8));
  ctx.fillStyle = '#f1c40f';
  ctx.beginPath();
  ctx.ellipse(0, 0, bird.r, bird.r * 0.85, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#e67e22';
  ctx.beginPath(); ctx.ellipse(bird.r * 0.6, 0, 6, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(4, -4, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(5, -4, 2, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  // Score
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(score, W/2, 40);
  // Waiting screen
  if (gameState === 'waiting') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px sans-serif';
    ctx.fillText('FLAPPY BIRD', W/2, H/2 - 20);
    ctx.font = '15px sans-serif';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Tape pour commencer', W/2, H/2 + 15);
  }
  // Dead screen
  if (gameState === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 26px sans-serif';
    ctx.fillText('Game Over', W/2, H/2 - 25);
    ctx.font = '16px sans-serif';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Score : ' + score, W/2, H/2 + 10);
    ctx.fillStyle = '#fff';
    ctx.font = '13px sans-serif';
    ctx.fillText('Tape pour rejouer', W/2, H/2 + 40);
  }
}

function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

// Controls
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); jump(); } });
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); });

init();
loop();
</script>
</body>
</html>
