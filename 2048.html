<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fff; user-select: none; }
  h1 { font-size: 28px; font-weight: 700; letter-spacing: 4px; margin-bottom: 8px; }
  .score-box { font-size: 13px; color: #aaa; margin-bottom: 14px; }
  .score-box span { color: #fff; font-weight: 600; }
  .grid { display: grid; grid-template-columns: repeat(4, 70px); grid-template-rows: repeat(4, 70px); gap: 8px; background: #1a1a1a; border-radius: 10px; padding: 10px; }
  .cell { width: 70px; height: 70px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; background: #2a2a2a; color: #fff; transition: background 0.1s; }
  .c2    { background: #eee4da; color: #776e65; }
  .c4    { background: #ede0c8; color: #776e65; }
  .c8    { background: #f2b179; color: #fff; }
  .c16   { background: #f59563; color: #fff; }
  .c32   { background: #f67c5f; color: #fff; }
  .c64   { background: #f65e3b; color: #fff; }
  .c128  { background: #edcf72; color: #fff; font-size: 17px; }
  .c256  { background: #edcc61; color: #fff; font-size: 17px; }
  .c512  { background: #edc850; color: #fff; font-size: 17px; }
  .c1024 { background: #edc53f; color: #fff; font-size: 14px; }
  .c2048 { background: #edc22e; color: #fff; font-size: 14px; }
  .controls { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .btn-row { display: flex; gap: 8px; justify-content: center; }
  .btn { background: #1a1a1a; border: 1px solid #333; color: #fff; width: 50px; height: 50px; border-radius: 8px; font-size: 18px; cursor: pointer; }
  .btn:active { background: #333; }
  .restart { background: #fff; color: #111; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 12px; }
  .overlay { position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .overlay h2 { font-size: 26px; }
  .overlay p { color: #aaa; font-size: 13px; }
</style>
</head>
<body>
<h1>2048</h1>
<div class="score-box">Score : <span id="score">0</span></div>
<div class="grid" id="grid"></div>
<div class="controls">
  <div class="btn-row"><button class="btn" onclick="move('up')">▲</button></div>
  <div class="btn-row">
    <button class="btn" onclick="move('left')">◀</button>
    <button class="btn" onclick="move('down')">▼</button>
    <button class="btn" onclick="move('right')">▶</button>
  </div>
</div>
<button class="restart" onclick="init()">Nouvelle partie</button>
<div class="overlay" id="overlay">
  <h2 id="overlayTitle">Game Over</h2>
  <p>Score : <span id="finalScore">0</span></p>
  <button class="restart" onclick="init()">Rejouer</button>
</div>

<script>
let board, score;

function init() {
  board = Array.from({length:4}, () => Array(4).fill(0));
  score = 0;
  document.getElementById('overlay').style.display = 'none';
  addTile(); addTile(); render();
}

function addTile() {
  const empty = [];
  board.forEach((r,ri) => r.forEach((v,ci) => { if(!v) empty.push([ri,ci]); }));
  if (!empty.length) return;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  board[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  board.forEach(row => row.forEach(v => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (v ? ' c'+v : '');
    cell.textContent = v || '';
    grid.appendChild(cell);
  }));
  document.getElementById('score').textContent = score;
}

function slide(row) {
  let arr = row.filter(v => v);
  for (let i = 0; i < arr.length-1; i++) {
    if (arr[i] === arr[i+1]) { arr[i] *= 2; score += arr[i]; arr.splice(i+1,1); }
  }
  while (arr.length < 4) arr.push(0);
  return arr;
}

function move(dir) {
  let moved = false;
  const prev = JSON.stringify(board);
  if (dir === 'left')  board = board.map(r => slide(r));
  if (dir === 'right') board = board.map(r => slide([...r].reverse()).reverse());
  if (dir === 'up')    board = transpose(board.map(r => slide(r.map((_,i) => board[i][r.indexOf(_)]))));
  if (dir === 'down')  board = transpose(board.map(r => slide([...r.map((_,i) => board[3-i][r.indexOf(_)])]).reverse()).map(r => r.reverse()));

  // Simpler approach
  if (dir === 'up' || dir === 'down') {
    const t = transpose(board);
    const slid = t.map(r => dir === 'up' ? slide(r) : slide([...r].reverse()).reverse());
    board = transpose(slid);
  } else {
    board = board.map(r => dir === 'left' ? slide(r) : slide([...r].reverse()).reverse());
  }

  if (JSON.stringify(board) !== prev) { addTile(); moved = true; }
  render();
  if (board.some(r => r.includes(2048))) { endGame(true); return; }
  if (!canMove()) endGame(false);
}

function transpose(m) { return m[0].map((_,i) => m.map(r => r[i])); }

function canMove() {
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) {
    if (!board[r][c]) return true;
    if (c<3 && board[r][c]===board[r][c+1]) return true;
    if (r<3 && board[r][c]===board[r+1][c]) return true;
  }
  return false;
}

function endGame(win) {
  document.getElementById('overlayTitle').textContent = win ? '🎉 2048 !' : 'Game Over';
  document.getElementById('finalScore').textContent = score;
  document.getElementById('overlay').style.display = 'flex';
}

document.addEventListener('keydown', e => {
  const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

// Swipe
let tx, ty;
document.getElementById('grid').addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; });
document.getElementById('grid').addEventListener('touchend', e => {
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if (Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
});

init();
</script>
</body>
</html>
