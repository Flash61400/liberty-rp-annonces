<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fff; user-select: none; }
  h1 { font-size: 24px; font-weight: 700; letter-spacing: 4px; margin-bottom: 8px; }
  .score-box { font-size: 13px; color: #aaa; margin-bottom: 12px; }
  .score-box span { color: #fff; font-weight: 600; }
  canvas { border: 1px solid #333; border-radius: 8px; display: block; }
  .controls { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  .btn-row { display: flex; gap: 8px; justify-content: center; }
  .btn { background: #1a1a1a; border: 1px solid #333; color: #fff; width: 52px; height: 52px; border-radius: 8px; font-size: 18px; cursor: pointer; }
  .btn:active { background: #333; }
  .overlay { position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .overlay h2 { font-size: 26px; }
  .overlay p { color: #aaa; font-size: 13px; }
  .restart { background: #fff; color: #111; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<h1>SNAKE</h1>
<div class="score-box">Score : <span id="score">0</span></div>
<canvas id="canvas" width="280" height="280"></canvas>
<div class="controls">
  <div class="btn-row"><button class="btn" onclick="setDir(0,-1)">▲</button></div>
  <div class="btn-row">
    <button class="btn" onclick="setDir(-1,0)">◀</button>
    <button class="btn" onclick="setDir(0,1)">▼</button>
    <button class="btn" onclick="setDir(1,0)">▶</button>
  </div>
</div>
<div class="overlay" id="overlay">
  <h2>Game Over</h2>
  <p>Score : <span id="finalScore">0</span></p>
  <button class="restart" onclick="init()">Rejouer</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const SIZE = 14, COLS = 20, ROWS = 20;
let snake, dir, nextDir, food, score, gameOver, interval;

function init() {
  snake = [{x:10, y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1, y:0}; nextDir = {x:1, y:0};
  score = 0; gameOver = false;
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('score').textContent = 0;
  placeFood();
  if (interval) clearInterval(interval);
  interval = setInterval(tick, 150);
}

function placeFood() {
  do { food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===food.x && s.y===food.y));
}

function tick() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    clearInterval(interval); gameOver = true;
    document.getElementById('finalScore').textContent = score;
    document.getElementById('overlay').style.display = 'flex';
    return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) { score += 10; document.getElementById('score').textContent = score; placeFood(); }
  else snake.pop();
  draw();
}

function draw() {
  ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,0,canvas.width,canvas.height);
  // grid
  ctx.strokeStyle = '#1a1a1a';
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) ctx.strokeRect(c*SIZE,r*SIZE,SIZE,SIZE);
  // food
  ctx.fillStyle = '#f00'; ctx.beginPath();
  ctx.arc(food.x*SIZE+SIZE/2, food.y*SIZE+SIZE/2, SIZE/2-1, 0, Math.PI*2); ctx.fill();
  // snake
  snake.forEach((s,i) => {
    ctx.fillStyle = i===0 ? '#fff' : '#aaa';
    ctx.fillRect(s.x*SIZE+1, s.y*SIZE+1, SIZE-2, SIZE-2);
  });
}

function setDir(x, y) {
  if (x===1&&dir.x===-1||x===-1&&dir.x===1) return;
  if (y===1&&dir.y===-1||y===-1&&dir.y===1) return;
  nextDir = {x, y};
}

document.addEventListener('keydown', e => {
  const map = { ArrowLeft:[-1,0], ArrowRight:[1,0], ArrowUp:[0,-1], ArrowDown:[0,1] };
  if (map[e.key]) { e.preventDefault(); setDir(...map[e.key]); }
});

// Swipe
let tx, ty;
document.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; });
document.addEventListener('touchend', e => {
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if (Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1, 0);
  else setDir(0, dy>0?1:-1);
});

init();
</script>
</body>
</html>
